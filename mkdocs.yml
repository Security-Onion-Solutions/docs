site_name: Security Onion Documentation
site_url: https://security-onion-solutions.github.io/docs/
site_author: Security Onion Solutions, LLC
copyright: Security Onion Solutions, LLC

theme:
  name: material
  logo: images/logo/so-logo.png
  favicon: images/logo/so-logo.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Security-Onion-Solutions
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/securityonion
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/c/SecurityOnion

extra_css:
  - _static/theme_overrides.css

extra_javascript:
  - _static/theme_overrides.js

plugins:
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: index.md
