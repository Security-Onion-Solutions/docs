name: Deploy MkDocs
on:
  push:
    branches:
      - main
      - dev
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install mkdocs mkdocs-material mkdocs-glightbox mike
      - name: Decide deploy path
        id: path
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "TARGET=." >> $GITHUB_OUTPUT          # root folder
          else
            echo "TARGET=${{ github.ref_name }}" >> $GITHUB_OUTPUT   # dev → dev/
          fi
      - name: Deploy with mike (no aliases, no version metadata)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          mike deploy --push ${{ steps.path.outputs.TARGET }}
